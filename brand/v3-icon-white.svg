<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" fill="none">
  <!-- MerkleClaw v3 — Geometric Claw Symbol (White on Transparent) -->
  
  <g transform="translate(256, 256)">
    
    <!-- Upper pincer -->
    <path d="M-60 -140 
             C-20 -155, 40 -140, 80 -100 
             C120 -60, 130 -10, 115 30 
             C105 55, 80 65, 55 60" 
          stroke="#FFFFFF" stroke-width="42" stroke-linecap="round" fill="none"/>
    
    <!-- Lower pincer -->
    <path d="M-60 -140 
             C-75 -105, -80 -60, -65 -20 
             C-50 20, -20 50, 20 60" 
          stroke="#FFFFFF" stroke-width="38" stroke-linecap="round" fill="none"/>
    
    <!-- Joint -->
    <circle cx="-60" cy="-140" r="28" fill="#FFFFFF"/>
    
    <!-- Arm -->
    <path d="M-60 -140 
             C-85 -100, -110 -40, -115 20 
             C-118 60, -108 100, -85 130" 
          stroke="#FFFFFF" stroke-width="36" stroke-linecap="round" fill="none"/>
    
    <!-- Pincer tips -->
    <circle cx="55" cy="60" r="8" fill="#FFFFFF"/>
    <circle cx="20" cy="60" r="7" fill="#FFFFFF"/>
    
    <!-- Arm base -->
    <circle cx="-85" cy="130" r="10" fill="#FFFFFF"/>
    
  </g>
</svg>
